  - type: Features
    data:
      - name: Startup Listing
        description: Submit and list beta-stage or newly launched tech products for community discovery.
      - name: Community Upvoting
        description: Community members upvote products, with top-voted products appearing on the homepage.
      - name: Instant Publishing
        description: Startups are published instantly upon submission for immediate community exposure.
      - name: Featured Listings
        description: Paid featured placements on the homepage and through the newsletter for expanded reach.
      - name: Newsletter Distribution
        description: Newsletter with 30,000+ subscribers distributes featured startups to an engaged audience.
      - name: Deals Section
        description: A dedicated deals section offering discounts on startup products.
      - name: Beta Subscriber Acquisition
        description: Founders gain beta subscribers, early adopters, and traffic through the platform.
  - type: UseCases
    data:
      - name: Startup Launch Visibility
        description: Gain initial product visibility and beta users by submitting a product to BetaPage.
      - name: Early Adopter Acquisition
        description: Reach a community of 65,000+ early adopters and tech enthusiasts at product launch.
      - name: Product Discovery
        description: Browse and discover newly launched tech products across various categories.
      - name: Feedback Collection
        description: Collect early user feedback from an engaged community of startup enthusiasts.
      - name: Newsletter Marketing
        description: Distribute product announcements to 30,000+ newsletter subscribers via featured listings.
