description: >-
  BetaPage was a startup discovery and listing platform where founders, makers, and
  early adopters could discover and submit beta-stage and newly launched tech products.
  The platform served a community of 65,000+ startup founders and tech enthusiasts with
  40,000+ tech products listed. BetaPage has since rebranded and redirects to PitchWall
  (pitchwall.co), an AI product discovery platform. No public developer API has been
  identified for BetaPage or its successor PitchWall.
